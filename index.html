<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookBuddy — Your Reading Notebook</title>
    <meta name="description" content="Track every book you read, save quotes, discover your taste, and find libraries near you — all in one living notebook." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&family=Kalam:wght@300;400;700&family=Patrick+Hand&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- SVG filters — paper texture ONLY, no displacement on UI -->
    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
      <defs>
        <!-- Paper grain texture for body background -->
        <filter id="paper" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
          <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
          <feComposite operator="in" in="grayNoise" in2="SourceGraphic" result="masked"/>
          <feBlend in="SourceGraphic" in2="masked" mode="multiply" result="out"/>
          <feComponentTransfer in="out">
            <feFuncR type="linear" slope="0.98" intercept="0.015"/>
            <feFuncG type="linear" slope="0.96" intercept="0.012"/>
            <feFuncB type="linear" slope="0.92" intercept="0.01"/>
          </feComponentTransfer>
        </filter>
        <!-- Subtle pencil texture for icons/stars -->
        <filter id="pencil">
          <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.8" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
    </svg>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
